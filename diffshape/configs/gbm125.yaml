# GBM125 — Glioblastoma tumor subjects (125 cases, 5 folds of 25)
dataset_name: gbm125
description: "Glioblastoma brain MRI dataset, 125 cases in 5 folds"

layout: folder_per_case

data_root: "tumor_data"

# For folder_per_case layout:
#   Each subfolder under data_root is one case (folder name = case_id).
#   image_filename / mask_filename are looked up inside each folder.
image_filename: "T1C.nii.gz"
# mask has variant filenames; list alternatives in order of priority
mask_filename:
  - "T1C_brain_mask_mc.nii.gz"
  - "T1C_brain_mask_m.nii.gz"

ordering_file: "data_utils_final/tumor_patients.npy"

crop_shape: [192, 192, 192]
crop_function: "legacy"
norm_method: "zs"

n_patch: 64

# K-fold split: 5 folds of 25 cases each, 17 train / 8 test per fold
split:
  method: "kfold"
  n_folds: 5
  fold_size: 25
  train_per_fold: 17
  test_per_fold: 8
